<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Calendar</title>
    <style>
      /* App-wide scrollbar theme. Matches the slate/navy palette used
         everywhere else in the suite (panels at #1E293B, borders at
         #334155, deep bg at #0F172A). Applies to all scrollable
         elements: page, modals, the ATS grid, etc. */
      html, body { margin: 0; padding: 0; height: 100%; background: #0F172A; }
      /* App-wide fix for the recurring "fields overlap their column" bug:
         form controls used width:100% with padding but content-box sizing, so
         they rendered wider than their grid/table cell and bled into the next
         one. border-box keeps width:100% INSIDE the cell. Targeted to form
         controls so it can't disturb other layout. */
      input, select, textarea, button { box-sizing: border-box; }
      /* App-wide dark dropdowns: the suite is dark-themed (body #0F172A), but
         native <select> popups + date/number pickers render in the OS light
         scheme unless color-scheme is set. Force dark so every dropdown's
         option list matches the app instead of flashing a white menu. Inline
         background/color on individual selects still win for the closed
         control; this only fixes the native-rendered popup + form-control
         defaults. */
      select, input, textarea { color-scheme: dark; }
      /* Body scroll stays available for app-level scroll on small
         screens; the ATS grid uses its own height-locked scroll
         container (S.tableWrap) so its horizontal bar lives at the
         bottom of the viewport, not at the bottom of all data. */
      /* -webkit-appearance: none defeats macOS overlay scrollbars
         (the auto-hiding ones that fade out when not actively
         scrolling). Without it, Chrome / Safari keep the overlay
         even when ::-webkit-scrollbar width/height is set. With it
         + the explicit width, the bar renders permanently inline. */
      ::-webkit-scrollbar { -webkit-appearance: none; width: 12px; height: 12px; }
      ::-webkit-scrollbar-track { background: #0F172A; }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 6px;
        border: 2px solid #0F172A;
      }
      ::-webkit-scrollbar-thumb:hover { background: #64748B; }
      ::-webkit-scrollbar-corner { background: #0F172A; }
      /* Firefox — scrollbar-color is "thumb track" */
      html, body { scrollbar-width: thin; scrollbar-color: #475569 #0F172A; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
