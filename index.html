<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Design Calendar</title>
    <style>
      /* App-wide scrollbar theme. Matches the slate/navy palette used
         everywhere else in the suite (panels at #1E293B, borders at
         #334155, deep bg at #0F172A). Applies to all scrollable
         elements: page, modals, the ATS grid, etc. */
      ::-webkit-scrollbar { width: 12px; height: 12px; }
      ::-webkit-scrollbar-track { background: #0F172A; }
      ::-webkit-scrollbar-thumb {
        background: #475569;
        border-radius: 6px;
        border: 2px solid #0F172A;
      }
      ::-webkit-scrollbar-thumb:hover { background: #64748B; }
      ::-webkit-scrollbar-corner { background: #0F172A; }
      /* Firefox — scrollbar-color is "thumb track" */
      html, body { scrollbar-width: thin; scrollbar-color: #475569 #0F172A; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
