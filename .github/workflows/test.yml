name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  # Required so the `test` status check is produced for GitHub merge-queue
  # groups. Without this trigger an enabled merge queue would wait forever
  # for a check that never runs on the temporary gh-readonly-queue branch.
  merge_group:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder
      VITE_AZURE_CLIENT_ID: placeholder
      VITE_AZURE_TENANT_ID: placeholder
      VITE_XORO_API_KEY: placeholder
      VITE_XORO_API_SECRET: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      # api/ smoke-check: tsc covers only TypeScript and vitest never loads
      # the dispatcher, so a SyntaxError / bad import in the plain-JS api/
      # layer would otherwise reach prod and 500 every route at once
      # (FUNCTION_INVOCATION_FAILED). Static parse + import-resolution gate.
      - run: npm run check:api
      # routes.js is generated from routes.manifest.js — fail if a PR edited
      # the manifest (or a handler path) without regenerating routes.js.
      - run: npm run gen:routes -- --check
      # Type-check ratchet. The vite/esbuild build only transpiles, so type
      # errors (incl. genuine ReferenceErrors) used to reach runtime. The OLD
      # `tsc -p tsconfig.json` was a no-op (solution-style root config), so a
      # backlog of ~150 errors built up. The ratchet runs the REAL `tsc -b`
      # and fails ONLY on errors not already in scripts/typecheck-baseline.txt
      # — new type errors are blocked; the baseline shrinks as files are fixed.
      - run: npm run typecheck
      - run: npm test

  # Production-build gate (2026-07-08 ops audit): vitest + tsc never run the
  # real vite/rollup production build, so a bad import, missing asset, or
  # rollup-only resolution failure could pass CI and then break the Vercel
  # deploy. Fail the PR instead.
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder
      VITE_AZURE_CLIENT_ID: placeholder
      VITE_AZURE_TENANT_ID: placeholder
      VITE_XORO_API_KEY: placeholder
      VITE_XORO_API_SECRET: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run build

  # Lint gate (2026-07-08 ops audit): minimal high-signal flat config in
  # eslint.config.js — core correctness rules only (no-dupe-keys, no-debugger,
  # use-isnan, …) over src/**/*.{ts,tsx}. Zero errors required; warnings
  # (e.g. react-hooks/rules-of-hooks legacy hits) do not fail the job.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      - run: npm run lint
