name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: placeholder
      VITE_AZURE_CLIENT_ID: placeholder
      VITE_AZURE_TENANT_ID: placeholder
      VITE_XORO_API_KEY: placeholder
      VITE_XORO_API_SECRET: placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - run: npm ci
      # Type-check gate (the repo's vite/esbuild build only transpiles, so
      # type errors used to slip through to runtime). Must stay green.
      - run: npm run typecheck
      - run: npm test
